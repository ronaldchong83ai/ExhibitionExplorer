<!DOCTYPE html>
<html>
<head>
  <title>ExhibitionExplorer Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    :root {
      --color-bg-primary: #0A1628;
      --color-bg-secondary: #0F2038;
      --color-accent-blue: #3B82F6;
      --color-text-primary: #FFFFFF;
      --color-text-secondary: #94A3B8;
      --color-border: rgba(255, 255, 255, 0.08);
      --gradient-dark: linear-gradient(135deg, #0A1628 0%, #060E1A 100%);
    }
    body {
      background: var(--gradient-dark);
      color: var(--color-text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      animation: scaleIn 0.3s ease-out;
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .logo {
      font-size: 56px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h2 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
    }
    p {
      color: var(--color-text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid var(--color-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--color-text-primary);
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.25s ease;
    }
    input:focus {
      border-color: var(--color-accent-blue);
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }
    button {
      background: var(--color-accent-blue);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:active {
      transform: scale(0.98);
      filter: brightness(0.9);
    }
    .status {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card" id="setup-card" style="display: none;">
    <div class="logo">🌐</div>
    <h2>ExhibitionExplorer</h2>
    <p>Enter the Exhibition Server URL or IP address to connect:</p>
    <input type="text" id="server-url" placeholder="https://exhibition-explorer.duckdns.org">
    <button onclick="saveAndConnect()">Connect</button>
  </div>
  
  <div id="status" class="status">Connecting to server...</div>

  <script>
    const STORAGE_KEY = 'exhibition_server_url';
    const savedUrl = localStorage.getItem(STORAGE_KEY);
    
    if (savedUrl) {
      // Perform redirect
      window.location.replace(savedUrl);
    } else {
      // Show setup input
      document.getElementById('setup-card').style.display = 'block';
      document.getElementById('status').style.display = 'none';
      
      // Pre-populate with remote IP
      document.getElementById('server-url').value = "https://exhibition-explorer.duckdns.org";
    }
    
    function saveAndConnect() {
      let url = document.getElementById('server-url').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'http://' + url;
      }
      localStorage.setItem(STORAGE_KEY, url);
      window.location.replace(url);
    }
  </script>
</body>
</html>
